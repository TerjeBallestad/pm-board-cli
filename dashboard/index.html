<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="shell">

  <!-- ── Left sidebar ─────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark"></div>
      <span class="brand-name" id="projectTitle">PM Board</span>
    </div>
    <button class="sidebar-search" id="sidebarSearchBtn">
      <span>Search</span>
      <kbd>⌘K</kbd>
    </button>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- populated by renderSidebar() -->
    </nav>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Projects <button class="sidebar-section-action" id="newProjectBtn" title="Start sprint">+</button></div>
      <div class="sidebar-projects" id="sidebarProjects"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Kinds</div>
      <div class="sidebar-kinds" id="sidebarKinds"></div>
    </div>
  </aside>

  <!-- ── Main column ──────────────────────────────────────────── -->
  <div class="main">
    <div class="topbar" id="topbar">
      <!-- populated by renderTopbar() -->
    </div>
    <div class="project-strip hidden" id="projectStrip">
      <!-- destination strip, populated by renderProjectView() -->
    </div>
    <div class="view-root">
      <main class="kanban hidden" id="kanbanBoard"></main>
      <main class="project-view hidden" id="projectView"></main>
      <main class="inbox-view hidden" id="inboxView"></main>
      <main class="documents-view hidden" id="documentsView"></main>
      <main class="plans-view hidden" id="plansView"></main>
      <main class="decisions-view hidden" id="decisionsView"></main>
      <main class="tests-view hidden" id="testsView"></main>
      <main class="archive-view hidden" id="archiveView"></main>
    </div>
  </div>

  <!-- ── Right rail ───────────────────────────────────────────── -->
  <aside class="rail" id="rail">
    <div class="rail-needs hidden" id="railNeeds"></div>
    <div class="rail-activity-title">Activity</div>
    <div class="rail-activity" id="railActivity"></div>
  </aside>

</div>

<!-- Slide-over detail panel -->
<div class="overlay hidden" id="detailOverlay">
  <div class="overlay-content" id="detailContent"></div>
</div>

<!-- New item modal -->
<div class="modal-backdrop hidden" id="modalBackdrop">
  <div class="modal">
    <div class="modal-header">
      <h2>New Ticket</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <form id="newItemForm">
      <div class="form-row form-row-split">
        <div>
          <label>Type</label>
          <select name="type" id="itemTypeSelect"></select>
        </div>
        <div>
          <label>Kind</label>
          <select name="kind" id="itemKindSelect">
            <option value="">—</option>
            <option value="research">research</option>
            <option value="probe">probe</option>
            <option value="grill">grill</option>
            <option value="task">task</option>
          </select>
        </div>
        <div>
          <label>Priority</label>
          <select name="priority"><option value="">—</option><option value="critical">Critical</option><option value="balance">Balance</option><option value="feature">Feature</option><option value="polish">Polish</option></select>
        </div>
      </div>
      <div class="form-row hidden">
        <label>Pillar</label>
        <select name="pillar" id="fieldPillar"><option value="">--</option></select>
      </div>
      <div class="form-row">
        <label>Title *</label>
        <input type="text" name="title" required>
      </div>
      <div class="form-row">
        <label>Description</label>
        <textarea name="body" rows="6" placeholder="Markdown supported — drop or paste images"></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="modalCancel">Cancel</button>
        <button type="submit" class="btn btn-primary">Create</button>
      </div>
    </form>
  </div>
</div>

<!-- Sprint modal -->
<div class="modal-backdrop hidden" id="sprintModalBackdrop">
  <div class="modal">
    <div class="modal-header">
      <h2>Start Project</h2>
      <button class="modal-close" id="sprintModalClose">&times;</button>
    </div>
    <form id="sprintForm">
      <div class="form-row">
        <label>Name *</label>
        <input type="text" name="name" required placeholder="e.g. Fix energy balance">
      </div>
      <div class="form-row">
        <label>Destination</label>
        <textarea name="problemStatement" rows="4" placeholder="Where does this project arrive? What does done look like?"></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="sprintModalCancel">Cancel</button>
        <button type="submit" class="btn btn-primary">Start</button>
      </div>
    </form>
  </div>
</div>

<!-- Quick-open palette (Cmd+K) -->
<div class="modal-backdrop quick-open-backdrop hidden" id="quickOpenBackdrop">
  <div class="quick-open">
    <input type="text" id="quickOpenInput" placeholder="Jump to anything — ID (SB-350, SDD-106, PLAN-090) or title…" autocomplete="off" spellcheck="false">
    <div class="quick-open-results" id="quickOpenResults"></div>
  </div>
</div>

<!-- Toast container -->
<div id="toasts"></div>

<script src="/app.js"></script>
</body>
</html>
